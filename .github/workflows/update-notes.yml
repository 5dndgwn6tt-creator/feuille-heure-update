name: Préparer une mise à jour Sparkle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.3)"
        required: true
      build:
        description: "Build (ex: 4)"
        required: true
      zip_url:
        description: "Lien RAW du ZIP"
        required: true

permissions:
  contents: write

jobs:
  update-appcast:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Générer résumé automatique
        id: notes
        run: |
          LAST_APPCAST_COMMIT=$(git log -n 1 --format=%H -- appcast.xml || true)

          if [ -n "$LAST_APPCAST_COMMIT" ]; then
            NOTES=$(git log --pretty=format:'- %s' "$LAST_APPCAST_COMMIT"..HEAD | head -n 6)
          else
            NOTES=$(git log --pretty=format:'- %s' -n 6)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Corrections et améliorations générales."
          fi

          NOTES_ESCAPED="${NOTES//'%'/'%25'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\n'/'%0A'}"
          NOTES_ESCAPED="${NOTES_ESCAPED//$'\r'/'%0D'}"

          echo "notes=$NOTES_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: Mettre à jour appcast.xml
        run: |
          VERSION="${{ inputs.version }}"
          BUILD="${{ inputs.build }}"
          ZIP_URL="${{ inputs.zip_url }}"
          NOTES="${{ steps.notes.outputs.notes }}"

          DESCRIPTION=$(printf '%s\n' "$NOTES" | sed ':a;N;$!ba;s/\n/<br\/>/g')

          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > appcast.xml
          echo "<rss version=\"2.0\" xmlns:sparkle=\"http://www.andymatuschak.org/xml-namespaces/sparkle\">" >> appcast.xml
          echo "<channel>" >> appcast.xml
          echo "<title>Feuille d'heure updates</title>" >> appcast.xml

          echo "<item>" >> appcast.xml
          echo "<title>Version ${VERSION}</title>" >> appcast.xml

          echo "<description><![CDATA[" >> appcast.xml
          echo "<h2>Changements</h2>" >> appcast.xml
          echo "<p>${DESCRIPTION}</p>" >> appcast.xml
          echo "]]></description>" >> appcast.xml

          echo "<enclosure url=\"${ZIP_URL}\" sparkle:version=\"${BUILD}\" sparkle:shortVersionString=\"${VERSION}\" length=\"0\" type=\"application/octet-stream\"/>" >> appcast.xml

          echo "</item>" >> appcast.xml
          echo "</channel>" >> appcast.xml
          echo "</rss>" >> appcast.xml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add appcast.xml
          git commit -m "Update appcast v${{ inputs.version }}" || echo "No changes"
          git push
